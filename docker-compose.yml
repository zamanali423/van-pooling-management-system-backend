version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fyp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fyp_db
    ports:
      - "5433:5432"
    volumes:
      - fyp_postgres_data:/var/lib/postgresql/data
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # tileserver:
  #   image: maptiler/tileserver-gl
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./tiles:/data
  # osrm:
  #   image: osrm/osrm-backend
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./osrm-data:/data
  #   command: >
  #     osrm-routed --algorithm mld /data/map.osrm    
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fyp_backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fyp_db
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fyp_network
    restart: unless-stopped

volumes:
  fyp_postgres_data:

networks:
  fyp_network:
    driver: bridge
